        function buscarLote() {
            // Obtenemos el valor que escribió el invitado
            const numeroIngresado = document.getElementById('loteInput').value.trim();
            const mensajeError = document.getElementById('errorMsg');

            // Verificamos si el número existe en nuestra base de datos
            if (baseDeDatosLotes[numeroIngresado]) {
                // Si existe, ocultamos el error (por si estaba visible) y redirigimos
                mensajeError.style.display = 'none';
                window.location.href = baseDeDatosLotes[numeroIngresado];
            } else {
                // Si no existe o está vacío, mostramos el mensaje de error
                mensajeError.style.display = 'block';
            }
        }

        // Agregamos la funcionalidad para que también busque al apretar "Enter" en el teclado
        document.getElementById('loteInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                buscarLote();
            }
        });
